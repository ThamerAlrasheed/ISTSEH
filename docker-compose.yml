services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: medsai
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/medsai
      JWT_SECRET_KEY: change-me
      DEBUG: "true"
      ALLOWED_ORIGINS: http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
